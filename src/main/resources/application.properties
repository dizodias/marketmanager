spring.application.name=marketmanager

spring.datasource.url=jdbc:mysql://localhost:3306/marketmanager_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

marketmanager.security.jwt.secret=marketmanager-default-dev-secret-please-change-in-production-2026
marketmanager.security.jwt.expiration-ms=43200000
marketmanager.security.jwt.issuer=marketmanager

marketmanager.security.admin.email=admin@marketmanager.com
marketmanager.security.admin.password=admin
marketmanager.security.admin.name=Administrator
